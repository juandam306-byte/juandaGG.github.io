<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="google-site-verification" content="LjesFhXSXGnu-NvKvy8K87DdbwahbWM5NdiV4Rg_Mxs" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuanGG</title>

    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="logo.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: Arial;
            background: #0b0b0b;
            color: #fff;
            display: flex
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #000;
            padding: 20px;
            height: 100vh;
            position: fixed;
            border-right: 1px solid #222;
            z-index: 1000
        }

        .sidebar h2 {
            color: red;
            margin-bottom: 20px
        }

        .sidebar button {
            width: 100%;
            background: none;
            border: none;
            color: #aaa;
            text-align: left;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer
        }

        .sidebar button:hover {
            background: #111;
            color: #fff
        }

        .sidebar button.active {
            background: #111;
            color: #fff
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            width: 100%
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #000;
            border-bottom: 1px solid #222
        }

        .menu-toggle {
            display: none;
            font-size: 22px;
            cursor: pointer
        }

        /* BOTONES PRO */
        .socials {
            display: flex;
            gap: 12px
        }

        .btn-social {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: bold;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: .3s;
        }

        .kick-pro {
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .kick-pro:hover {
            background: #00ff88;
            color: #000;
            box-shadow: 0 0 15px #00ff88, 0 0 40px #00ff88;
            transform: scale(1.08);
        }

        .yt-pro {
            color: #ff2a2a;
            border: 1px solid #ff2a2a;
        }

        .yt-pro:hover {
            background: #ff2a2a;
            color: #000;
            box-shadow: 0 0 15px red, 0 0 40px red;
            transform: scale(1.08);
        }

        .btn-social span {
            animation: floatIcon 2s infinite ease-in-out;
        }

        @keyframes floatIcon {
            0% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-3px)
            }

            100% {
                transform: translateY(0)
            }
        }

        .btn-social::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: .5s;
        }

        .btn-social:hover::after {
            left: 100%;
        }

        /* HERO */
        .hero {
            height: 60vh;
            position: relative
        }

        .hero video {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, .9), transparent)
        }

        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%)
        }

        /* SECTION */
        .section {
            padding: 30px
        }

        /* LIVE */
        .live-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px
        }

        .player {
            position: relative;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden
        }

        .player iframe {
            position: absolute;
            width: 100%;
            height: 100%
        }

        .chat iframe {
            width: 100%;
            height: 400px;
            border-radius: 12px
        }

        /* VIDEOS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px
        }

        .card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: .3s;
        }

        .card img {
            width: 100%
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px red
        }

        .video-title {
            padding: 10px;
            font-size: 0.9em;
            color: #ddd;
            height: 50px;
            overflow: hidden;
        }

        /* ROUTES */
        .page {
            display: none
        }

        .active {
            display: block
        }

        /* MOBILE */
        @media(max-width:700px) {

            .menu-toggle {
                display: block
            }

            .sidebar {
                transform: translateX(-260px);
                transition: .3s;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }

            .socials {
                display: none;
            }

            #overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(4px);
                opacity: 0;
                pointer-events: none;
                transition: .3s;
            }

            #overlay.show {
                opacity: 1;
                pointer-events: auto;
            }
        }

        #overlay {
            display: none
        }
    </style>
</head>

<body>

    <div id="overlay" onclick="closeMenu()"></div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🔥 Juan GG</h2>
        <button class="active" onclick="go('home',this)">Inicio</button>
        <button onclick="go('live',this)">Directo</button>
        <button onclick="go('videos',this)">Videos</button>
        <button onclick="go('about',this)">Sobre mí</button>
    </div>

    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <span class="menu-toggle" onclick="openMenu()">☰</span>
            <h3>JUAN GG </h3>

            <div class="socials">
                <a href="https://kick.com/JuanDavid22GG" target="_blank" class="btn-social kick-pro">
                    <span>🟢</span> Kick
                </a>

                <a href="https://www.youtube.com/channel/UCxyeUbu8oM-Xg_YfKGKqrFQ" target="_blank" class="btn-social yt-pro">
                    <span>🔴</span> YouTube
                </a>
            </div>
        </div>

        <!-- HOME -->
        <div id="home" class="page active">

            <div class="hero">
                <video autoplay muted loop>
                    <source src="video.mp4">
                </video>
                <div class="overlay"></div>
                <div class="hero-content">
                    <h1>Juan David GG</h1>
                </div>
            </div>

            <div class="section">
                <h2>Últimos Videos</h2>
                <div id="homeVideos" class="grid"></div>
            </div>

        </div>

        <!-- LIVE -->
        <div id="live" class="page section">
            <h2>Directo</h2>

            <div class="live-grid">
                <div class="player">
                    <iframe src="https://player.kick.com/JuanDavid22GG"></iframe>
                </div>

                <div class="chat">
                    <iframe src="https://kick.com/JuanDavid22GG/chat"></iframe>
                </div>
            </div>
        </div>

        <!-- VIDEOS -->
        <div id="videos" class="page section">
            <h2>Videos</h2>
            <div id="videoGrid" class="grid"></div>
        </div>

        <!-- SOBRE MI -->
        <div id="about" class="page section">
            <h2>Sobre mí</h2>
            <p>Soy Juan David GG, Creador de contenido (Warzone) de youtube y streamer de kick 🔥</p>
        </div>

    </div>

    <script>
        const CHANNEL_ID = "UCxyeUbu8oM-Xg_YfKGKqrFQ";

        /* NAV */
        function go(page, btn) {
            document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
            document.getElementById(page).classList.add("active");

            document.querySelectorAll(".sidebar button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            closeMenu();
        }

        /* MOBILE */
        function openMenu() {
            document.querySelector(".sidebar").classList.add("open");
            document.getElementById("overlay").classList.add("show");
        }

        function closeMenu() {
            document.querySelector(".sidebar").classList.remove("open");
            document.getElementById("overlay").classList.remove("show");
        }

        /* VIDEOS */
       const API_KEY = "AIzaSyAKIxmw8S4I9DmfKH4K90KWdUJYYwWTd1Q"; // 👈 IMPORTANTE

async function loadVideos(pageToken = "") {

  const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=50${pageToken ? `&pageToken=${pageToken}` : ""}`;

  const res = await fetch(url);
  const data = await res.json();

  ["videoGrid","homeVideos"].forEach(id=>{
    const el = document.getElementById(id);

    data.items.forEach(v=>{
      if(!v.id.videoId) return;

      el.innerHTML += `
        <div class="card" onclick="window.open('https://youtube.com/watch?v=${v.id.videoId}')">
          <img src="${v.snippet.thumbnails.medium.url}">
          <div class="video-title">${v.snippet.title}</div>
        </div>
      `;
    });
  });

  // 🔥 CARGA AUTOMÁTICA DE TODOS LOS VIDEOS
  if(data.nextPageToken){
    loadVideos(data.nextPageToken);
  }
}

loadVideos();

        
    </script>

</body>

</html>
